<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eagle Pinball One - Fixed</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; flex-direction: column; align-items: center; touch-action: none; }
        #score { color: #00ff41; font-family: monospace; font-size: 24px; padding: 10px; text-shadow: 0 0 10px #00ff41; }
        canvas { border: 2px solid #00ff41; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="score">SCORE: 0000</div>
    <script>
        const { Engine, Render, Runner, Bodies, Composite, Constraint, Events, Body } = Matter;
        const engine = Engine.create();
        const world = engine.world;
        world.gravity.y = 1.5;

        const render = Render.create({
            element: document.body,
            engine: engine,
            options: { width: 380, height: 580, wireframes: false, background: '#050505' }
        });

        // --- MURS ---
        const wallStyle = { isStatic: true, render: { fillStyle: '#00ff41' } };
        Composite.add(world, [
            Bodies.rectangle(190, 0, 380, 20, wallStyle), // Haut
            Bodies.rectangle(0, 290, 20, 580, wallStyle),   // Gauche
            Bodies.rectangle(380, 290, 20, 580, wallStyle),  // Droite
            // Rampes pour guider vers les flips
            Bodies.rectangle(40, 540, 120, 20, { isStatic: true, angle: 0.7, render: { fillStyle: '#00ff41' } }),
            Bodies.rectangle(340, 540, 120, 20, { isStatic: true, angle: -0.7, render: { fillStyle: '#00ff41' } })
        ]);

        // --- BUMPERS (Avec restitution boostée) ---
        const createBumper = (x, y) => {
            return Bodies.circle(x, y, 25, { 
                isStatic: true, 
                restitution: 2.5, // Très fort rebond pour ne pas bloquer la balle
                render: { fillStyle: '#053a10', strokeStyle: '#00ff41', lineWidth: 4 } 
            });
        };
        const bumperCentre = createBumper(190, 250);
        Composite.add(world, [createBumper(100, 150), createBumper(280, 150), bumperCentre]);

        // --- LA BILLE ---
        const ball = Bodies.circle(190, 50, 12, { 
            restitution: 0.6, friction: 0, frictionAir: 0.001, density: 0.01,
            render: { fillStyle: '#fff' } 
        });
        Composite.add(world, ball);

        // --- LES FLIPPERS (SÉPARÉS) ---
        const createFlipper = (x, y, side) => {
            const isLeft = side === 'left';
            const flipper = Bodies.rectangle(x, y, 90, 20, { 
                chamfer: { radius: 10 },
                render: { fillStyle: '#00ff41' }
            });

            // Pivot décalé vers l'extérieur pour laisser de l'espace au centre
            const pivot = Constraint.create({
                bodyB: flipper, 
                pointB: { x: isLeft ? -40 : 40, y: 0 },
                pointA: { x: x, y: y }, 
                stiffness: 1, length: 0, render: { visible: false }
            });
            return { body: flipper, pivot: pivot, side: side };
        };

        // On les écarte bien : l'un à 100, l'autre à 280
        const leftF = createFlipper(100, 520, 'left');
        const rightF = createFlipper(280, 520, 'right');
        Composite.add(world, [leftF.body, leftF.pivot, rightF.body, rightF.pivot]);

        // --- MÉCANIQUE DE FRAPPE ---
        const flip = (f) => {
            const force = f.side === 'left' ? -0.35 : 0.35;
            Body.applyForce(f.body, 
                { x: f.body.position.x + (f.side === 'left' ? 40 : -40), y: f.body.position.y },
                { x: 0, y: force }
            );
        };

        window.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touchX = e.touches[0].clientX;
            if (touchX < window.innerWidth / 2) flip(leftF);
            else flip(rightF);
        }, { passive: false });

        // --- GESTION DES ANGLES (RESSORTS PLUS FERMES) ---
        Events.on(engine, 'beforeUpdate', () => {
            // Gauche : Repos à 0.4 rad (descendu), Frappe à -0.7 rad (monté)
            if (leftF.body.angle > 0.4) Body.setAngle(leftF.body, 0.4);
            if (leftF.body.angle < -0.7) Body.setAngle(leftF.body, -0.7);
            Body.setAngularVelocity(leftF.body, (0.4 - leftF.body.angle) * 0.3);

            // Droite : Repos à -0.4 rad, Frappe à 0.7 rad
            if (rightF.body.angle < -0.4) Body.setAngle(rightF.body, -0.4);
            if (rightF.body.angle > 0.7) Body.setAngle(rightF.body, 0.7);
            Body.setAngularVelocity(rightF.body, (-0.4 - rightF.body.angle) * 0.3);
        });

        // --- SCORE ET ANTI-BLOCAGE ---
        let score = 0;
        Events.on(engine, 'collisionStart', (event) => {
            event.pairs.forEach((pair) => {
                if (pair.bodyA.isStatic || pair.bodyB.isStatic) {
                    score += 50;
                    document.getElementById('score').innerText = `SCORE: ${score.toString().padStart(4, '0')}`;
                }
            });
        });

        Render.run(render);
        Runner.run(Runner.create(), engine);
    </script>
</body>
</html>
