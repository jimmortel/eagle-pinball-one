<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eagle Pinball One</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; flex-direction: column; align-items: center; font-family: 'Courier New', Courier, monospace; touch-action: none; }
        #ui-container { width: 100%; max-width: 380px; display: flex; justify-content: space-between; padding: 10px; box-sizing: border-box; }
        #score { color: #00ff41; font-size: 20px; text-shadow: 0 0 10px #00ff41; }
        canvas { border: 3px solid #00ff41; box-shadow: 0 0 25px rgba(0, 255, 65, 0.5); border-radius: 15px; }
    </style>
</head>
<body>
    <div id="ui-container">
        <div id="score">SCORE: 0000</div>
    </div>

    <script>
        const { Engine, Render, Runner, Bodies, Composite, Constraint, Events, Body } = Matter;
        const engine = Engine.create();
        const world = engine.world;
        world.gravity.y = 1.5;

        const render = Render.create({
            element: document.body,
            engine: engine,
            options: { width: 380, height: 580, wireframes: false, background: '#050505' }
        });

        // MURS ET STRUCTURE
        const wallStyle = { isStatic: true, render: { fillStyle: '#00ff41' } };
        Composite.add(world, [
            Bodies.rectangle(190, 0, 380, 20, wallStyle),
            Bodies.rectangle(0, 290, 20, 580, wallStyle),
            Bodies.rectangle(380, 290, 20, 580, wallStyle),
            // Rampes du bas (entonnoir)
            Bodies.rectangle(55, 560, 150, 20, { isStatic: true, angle: 0.5, render: { fillStyle: '#00ff41' } }),
            Bodies.rectangle(325, 560, 150, 20, { isStatic: true, angle: -0.5, render: { fillStyle: '#00ff41' } })
        ]);

        // BUMPERS (CIBLES)
        const createBumper = (x, y) => {
            let b = Bodies.circle(x, y, 22, { isStatic: true, restitution: 2.2, render: { fillStyle: '#053a10', strokeStyle: '#00ff41', lineWidth: 3 } });
            b.label = "bumper";
            return b;
        };
        Composite.add(world, [createBumper(110, 140), createBumper(270, 140), createBumper(190, 240)]);

        // LA BILLE
        const ball = Bodies.circle(190, 50, 11, { restitution: 0.5, friction: 0.005, density: 0.05, render: { fillStyle: '#fff' } });
        Composite.add(world, ball);
                // --- LES FLIPPERS AMÉLIORÉS ---
        const createFlipper = (x, y, side) => {
            const isLeft = side === 'left';
            const flipper = Bodies.rectangle(x, y, 95, 22, { 
                chamfer: { radius: 10 },
                render: { fillStyle: '#00ff41' },
                label: 'flipper'
            });

            const pivot = Constraint.create({
                bodyB: flipper, 
                pointB: { x: isLeft ? -42 : 42, y: 0 },
                pointA: { x: x, y: y }, 
                stiffness: 1, length: 0, render: { visible: false }
            });
            return { body: flipper, pivot: pivot, side: side };
        };

        const leftF = createFlipper(125, 520, 'left');
        const rightF = createFlipper(255, 520, 'right');
        Composite.add(world, [leftF.body, leftF.pivot, rightF.body, rightF.pivot]);

        // --- MÉCANIQUE DE FRAPPE ---
        const flip = (f) => {
            const force = f.side === 'left' ? -0.22 : 0.22;
            Body.applyForce(f.body, 
                { x: f.body.position.x + (f.side === 'left' ? 45 : -45), y: f.body.position.y },
                { x: 0, y: force }
            );
        };

        window.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touchX = e.touches[0].clientX;
            if (touchX < window.innerWidth / 2) flip(leftF);
            else flip(rightF);
        }, { passive: false });

        // GESTION DES ANGLES ET RESSORTS (ANTI-FANTÔME)
        Events.on(engine, 'beforeUpdate', () => {
            // Gauche
            if (leftF.body.angle > 0.3) Body.setAngle(leftF.body, 0.3);
            if (leftF.body.angle < -0.6) Body.setAngle(leftF.body, -0.6);
            Body.setAngularVelocity(leftF.body, (0.3 - leftF.body.angle) * 0.15);

            // Droite
            if (rightF.body.angle < -0.3) Body.setAngle(rightF.body, -0.3);
            if (rightF.body.angle > 0.6) Body.setAngle(rightF.body, 0.6);
            Body.setAngularVelocity(rightF.body, (-0.3 - rightF.body.angle) * 0.15);
        });

        // SYSTÈME DE SCORE
        let score = 0;
        Events.on(engine, 'collisionStart', (event) => {
            event.pairs.forEach((pair) => {
                if (pair.bodyA.label === "bumper" || pair.bodyB.label === "bumper") {
                    score += 100;
                    document.getElementById('score').innerText = `SCORE: ${score.toString().padStart(4, '0')}`;
                }
            });
        });

        Render.run(render);
        Runner.run(Runner.create(), engine);
    </script>
</body>
</html>
