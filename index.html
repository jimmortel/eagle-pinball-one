<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eagle Pinball One - Fixed</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; flex-direction: column; align-items: center; touch-action: none; }
        #score { color: #00ff41; font-family: monospace; font-size: 24px; padding: 10px; text-shadow: 0 0 10px #00ff41; }
        canvas { border: 2px solid #00ff41; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="score">SCORE: 0000</div>
    <script>
                const { Engine, Render, Runner, Bodies, Composite, Constraint, Events, Body } = Matter;
        const engine = Engine.create();
        const world = engine.world;
        world.gravity.y = 1.5;

        const render = Render.create({
            element: document.body,
            engine: engine,
            options: { width: 380, height: 580, wireframes: false, background: '#050505' }
        });

        // --- STRUCTURE ---
        const wallStyle = { isStatic: true, render: { fillStyle: '#00ff41' } };
        Composite.add(world, [
            Bodies.rectangle(190, 0, 380, 20, wallStyle),
            Bodies.rectangle(0, 290, 20, 580, wallStyle),
            Bodies.rectangle(380, 290, 20, 580, wallStyle),
            Bodies.rectangle(45, 540, 120, 20, { isStatic: true, angle: 0.7, render: { fillStyle: '#00ff41' } }),
            Bodies.rectangle(335, 540, 120, 20, { isStatic: true, angle: -0.7, render: { fillStyle: '#00ff41' } })
        ]);

        // --- BUMPERS (Avec sursaut anti-blocage) ---
        const createBumper = (x, y) => {
            let b = Bodies.circle(x, y, 25, { isStatic: true, restitution: 2.5, render: { fillStyle: '#053a10', strokeStyle: '#00ff41', lineWidth: 4 } });
            b.label = "bumper";
            return b;
        };
        const bumpers = [createBumper(100, 160), createBumper(280, 160), createBumper(190, 260)];
        Composite.add(world, bumpers);

        // --- LA BILLE ---
        const ball = Bodies.circle(195, 50, 12, { restitution: 0.5, friction: 0, density: 0.01, render: { fillStyle: '#fff' } });
        Composite.add(world, ball);

        // --- FLIPPERS RECTIFIÉS ---
        const createFlipper = (x, y, side) => {
            const isLeft = side === 'left';
            const flipper = Bodies.rectangle(x, y, 90, 20, { chamfer: { radius: 10 }, render: { fillStyle: '#00ff41' } });
            const pivot = Constraint.create({
                bodyB: flipper, 
                pointB: { x: isLeft ? -40 : 40, y: 0 },
                pointA: { x: x, y: y }, 
                stiffness: 1, length: 0, render: { visible: false }
            });
            return { body: flipper, pivot: pivot, side: side };
        };

        const leftF = createFlipper(110, 520, 'left');
        const rightF = createFlipper(270, 520, 'right');
        Composite.add(world, [leftF.body, leftF.pivot, rightF.body, rightF.pivot]);

        // --- MÉCANIQUE DE FRAPPE (CORRECTION DROITE) ---
        const flip = (f) => {
            // Force négative (vers le haut) pour les deux, mais appliquée sur le bout opposé au pivot
            const force = -0.35; 
            const offset = f.side === 'left' ? 40 : -40; // On pousse sur l'extrémité libre
            Body.applyForce(f.body, { x: f.body.position.x + offset, y: f.body.position.y }, { x: 0, y: force });
        };

        window.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touchX = e.touches[0].clientX;
            if (touchX < window.innerWidth / 2) flip(leftF);
            else flip(rightF);
        }, { passive: false });

        // --- ANGLES ET RESSORTS (ANTI-INVERSION) ---
        Events.on(engine, 'beforeUpdate', () => {
            // Gauche : Repos 0.4 (bas), Frappe -0.6 (haut)
            if (leftF.body.angle > 0.4) Body.setAngle(leftF.body, 0.4);
            if (leftF.body.angle < -0.6) Body.setAngle(leftF.body, -0.6);
            Body.setAngularVelocity(leftF.body, (0.4 - leftF.body.angle) * 0.25);

            // Droite : Repos -0.4 (bas), Frappe 0.6 (haut)
            if (rightF.body.angle < -0.4) Body.setAngle(rightF.body, -0.4);
            if (rightF.body.angle > 0.6) Body.setAngle(rightF.body, 0.6);
            Body.setAngularVelocity(rightF.body, (-0.4 - rightF.body.angle) * 0.25);
        });

        // --- SCORE & ANTI-BLOCAGE ---
        Events.on(engine, 'collisionStart', (event) => {
            event.pairs.forEach((pair) => {
                if (pair.bodyA.label === "bumper" || pair.bodyB.label === "bumper") {
                    // Petite impulsion aléatoire pour que la balle ne reste jamais immobile
                    Body.setVelocity(ball, { x: (Math.random() - 0.5) * 10, y: -10 });
                }
            });
        });

        Render.run(render);
        Runner.run(Runner.create(), engine);
    </script>
</body>
</html>
