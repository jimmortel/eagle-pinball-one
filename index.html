<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eagle Pinball One</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            font-family: 'Courier New', Courier, monospace; 
            touch-action: none;
        }
        #ui-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            justify-content: space-between;
            padding: 10px;
            box-sizing: border-box;
        }
        #score { 
            color: #00ff41; 
            font-size: 20px; 
            text-shadow: 0 0 10px #00ff41; 
        }
        #status {
            color: #fff;
            font-size: 14px;
            text-transform: uppercase;
        }
        canvas { 
            border: 3px solid #00ff41; 
            box-shadow: 0 0 25px rgba(0, 255, 65, 0.5); 
            border-radius: 15px; 
            background: radial-gradient(circle, #101010 0%, #000 100%);
        }
        .arcade-btn {
            margin-top: 15px;
            padding: 12px 24px;
            background: #00ff41;
            color: #000;
            border: none;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 0 15px #00ff41;
        }
    </style>
</head>
<body>
    <div id="ui-container">
        <div id="score">SCORE: 0000</div>
        <div id="status">Eagle Arcade v1</div>
    </div>

    <script>
        const { Engine, Render, Runner, Bodies, Composite, Constraint, Events, Body } = Matter;

        // --- CONFIGURATION ---
        const WALLET_DESTINATION = "0x872bD846596Cc1aEde8Fd800997d242e3473fA83";
        const engine = Engine.create();
        const world = engine.world;
        world.gravity.y = 1.6; // Gravité lourde pour le réalisme

        const render = Render.create({
            element: document.body,
            engine: engine,
            options: { 
                width: 380, 
                height: 580, 
                wireframes: false, 
                background: 'transparent' 
            }
        });

        // --- STRUCTURE DU PLATEAU (Néon) ---
        const wallStyle = { isStatic: true, render: { fillStyle: '#00ff41' } };
        const walls = [
            Bodies.rectangle(190, 0, 380, 20, wallStyle), // Haut
            Bodies.rectangle(0, 290, 20, 580, wallStyle),   // Gauche
            Bodies.rectangle(380, 290, 20, 580, wallStyle),  // Droite
            // Entonnoir vers les flippers
            Bodies.rectangle(50, 550, 140, 20, { isStatic: true, angle: 0.6, render: { fillStyle: '#00ff41' } }),
            Bodies.rectangle(330, 550, 140, 20, { isStatic: true, angle: -0.6, render: { fillStyle: '#00ff41' } })
        ];
        Composite.add(world, walls);

        // --- BUMPERS ÉLECTRIQUES ---
        const createBumper = (x, y) => {
            let b = Bodies.circle(x, y, 22, { 
                isStatic: true, 
                restitution: 2.0, // Rebond violent
                render: { fillStyle: '#053a10', strokeStyle: '#00ff41', lineWidth: 4 } 
            });
            b.label = "bumper";
            return b;
        };
        const bumpers = [createBumper(110, 140), createBumper(270, 140), createBumper(190, 240)];
        Composite.add(world, bumpers);

        // --- LA BILLE D'ACIER ---
        const ball = Bodies.circle(200, 40, 11, { 
            restitution: 0.4, 
            friction: 0.002, 
            density: 0.06, // Poids important
            render: { fillStyle: '#fff', strokeStyle: '#00ff41', lineWidth: 2 } 
        });
        Composite.add(world, ball);

        // --- LES FLIPPERS AMÉLIORÉS ---
const createFlipper = (x, y, side) => {
    const isLeft = side === 'left';
    const group = Body.nextGroup(true);
    
    // On allonge un peu la palette pour mieux attraper la balle
    const flipper = Bodies.rectangle(x, y, 90, 20, { 
        collisionFilter: { group: group },
        chamfer: { radius: 10 },
        render: { fillStyle: '#00ff41' },
        label: 'flipper'
    });

    const pivot = Constraint.create({
        bodyB: flipper, 
        pointB: { x: isLeft ? -40 : 40, y: 0 },
        pointA: { x: x, y: y }, 
        stiffness: 1, 
        length: 0,
        render: { visible: false }
    });

    // BUTÉES : Pour empêcher le flipper de monter trop haut ou descendre trop bas
    const limit = Bodies.circle(x, y, 1, { isStatic: true, render: { visible: false } });

    return { body: flipper, pivot: pivot, side: side };
};

const leftF = createFlipper(120, 520, 'left');
const rightF = createFlipper(260, 520, 'right');
Composite.add(world, [leftF.body, leftF.pivot, rightF.body, rightF.pivot]);

// --- LE SECRET DE LA FRAPPE (FORCE BRUTE) ---
const flip = (f) => {
    const force = f.side === 'left' ? -0.15 : 0.15;
    // On applique une force vers le haut sur le bout de la palette
    Body.applyForce(f.body, 
        { x: f.body.position.x + (f.side === 'left' ? 40 : -40), y: f.body.position.y },
        { x: 0, y: force }
    );
};

// --- CONTRÔLES TACTILES RÉACTIFS ---
window.addEventListener('touchstart', (e) => {
    e.preventDefault(); // Empêche le scroll
    const touchX = e.touches[0].clientX;
    const screenWidth = window.innerWidth;
    
    if (touchX < screenWidth / 2) flip(leftF);
    else flip(rightF);
}, { passive: false });

// Retour auto à la position initiale (Ressort)
Events.on(engine, 'beforeUpdate', () => {
    // Ressort pour le flipper gauche
    if (leftF.body.angle > 0.3) Body.setAngle(leftF.body, 0.3);
    if (leftF.body.angle < -0.5) Body.setAngle(leftF.body, -0.5);
    Body.setAngularVelocity(leftF.body, (0.3 - leftF.body.angle) * 0.1);

    // Ressort pour le flipper droit
    if (rightF.body.angle < -0.3) Body.setAngle(rightF.body, -0.3);
    if (rightF.body.angle > 0.5) Body.setAngle(rightF.body, 0.5);
    Body.setAngularVelocity(rightF.body, (-0.3 - rightF.body.angle) * 0.1);
});
    </script>
</body>
  </html>
