<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eagle Pinball - Super Precision</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; flex-direction: column; align-items: center; touch-action: none; }
        #score { color: #00ff41; font-family: monospace; font-size: 24px; padding: 10px; text-shadow: 0 0 10px #00ff41; }
        canvas { border: 2px solid #00ff41; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="score">SCORE: 0000</div>
    <script>
        const { Engine, Render, Runner, Bodies, Composite, Constraint, Events, Body, Vector } = Matter;
        
        // --- 1. PRÉCISION ULTIME ---
        // On passe à 30 itérations de position pour éviter les "trous" physiques
        const engine = Engine.create({ 
            positionIterations: 30, 
            velocityIterations: 30 
        });
        const world = engine.world;
        world.gravity.y = 1.5; // Gravité légèrement réduite pour plus de contrôle

        const render = Render.create({
            element: document.body,
            engine: engine,
            options: { width: 380, height: 580, wireframes: false, background: '#050505' }
        });

        // --- 2. STRUCTURE ---
        const wallStyle = { isStatic: true, render: { fillStyle: '#00ff41' } };
        Composite.add(world, [
            Bodies.rectangle(190, 0, 380, 40, wallStyle), // Plafond épais
            Bodies.rectangle(0, 290, 40, 580, wallStyle),  // Mur gauche épais
            Bodies.rectangle(380, 290, 40, 580, wallStyle), // Mur droit épais
            // Rampes de bas de plateau
            Bodies.rectangle(50, 570, 180, 50, { isStatic: true, angle: 0.5, render: { fillStyle: '#00ff41' } }),
            Bodies.rectangle(330, 570, 180, 50, { isStatic: true, angle: -0.5, render: { fillStyle: '#00ff41' } })
        ]);

        // --- 3. BUMPERS ---
        const createBumper = (x, y) => {
            let b = Bodies.circle(x, y, 18, { 
                isStatic: true, 
                restitution: 1.5, 
                render: { fillStyle: '#053a10', strokeStyle: '#00ff41', lineWidth: 3 } 
            });
            b.label = "bumper";
            return b;
        };
        Composite.add(world, [createBumper(110, 140), createBumper(270, 140), createBumper(190, 240)]);

        // --- 4. LA BILLE (CCD - Continuous Collision Detection) ---
        let ball = Bodies.circle(190, 50, 12, { 
            restitution: 0.3, 
            friction: 0, 
            density: 0.5, // Plus lourde pour être mieux détectée
            label: "ball",
            slop: 0 // Élimine la tolérance de pénétration
        });
        Composite.add(world, ball);

        // --- 5. FLIPPERS "ARMURE" (Épais et resserrés) ---
        const createFlipper = (x, y, side) => {
            const isLeft = side === 'left';
            // 50px d'épaisseur pour stopper net la bille
            const flipper = Bodies.rectangle(x, y, 125, 50, { 
                chamfer: { radius: 15 }, 
                render: { fillStyle: '#00ff41' },
                label: 'flipper'
            });

            const pivot = Constraint.create({
                bodyB: flipper, 
                pointB: { x: isLeft ? -50 : 50, y: 0 },
                pointA: { x: x, y: y }, 
                stiffness: 1, length: 0, render: { visible: false }
            });
            return { body: flipper, pivot: pivot, side: side };
        };

        const leftF = createFlipper(95, 505, 'left');
        const rightF = createFlipper(285, 505, 'right');
        Composite.add(world, [leftF.body, leftF.pivot, rightF.body, rightF.pivot]);

        // --- 6. LOGIQUE DE JEU ---
        let score = 0;
        let isGameOver = false;

        const flip = (f) => {
            // On utilise une vitesse angulaire directe plutôt qu'une force
            // C'est beaucoup plus efficace pour stopper une bille rapide
            Body.setAngularVelocity(f.body, f.side === 'left' ? -0.5 : 0.5);
            const forceY = -2.5; 
            const offset = f.side === 'left' ? 60 : -60;
            Body.applyForce(f.body, { x: f.body.position.x + offset, y: f.body.position.y }, { x: 0, y: forceY });
        };

        window.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touchX = e.touches[0].clientX;
            if (touchX < window.innerWidth / 2) flip(leftF);
            else flip(rightF);
        }, { passive: false });

        // COLLISIONS (Score & Anti-traversée Bumper)
        Events.on(engine, 'collisionStart', (event) => {
            if (isGameOver) return;
            event.pairs.forEach((pair) => {
                if (pair.bodyA.label === 'bumper' || pair.bodyB.label === 'bumper') {
                    const bumper = pair.bodyA.label === 'bumper' ? pair.bodyA : pair.bodyB;
                    score += 100;
                    document.getElementById('score').innerText = `SCORE: ${score.toString().padStart(4, '0')}`;
                    
                    const diff = Vector.sub(ball.position, bumper.position);
                    const drift = (Math.random() - 0.5) * 2;
                    const boost = Vector.mult(Vector.normalise({ x: diff.x + drift, y: diff.y }), 15);
                    Body.setVelocity(ball, boost);
                }
            });
        });

        // BOUCLE DE MISE À JOUR
        Events.on(engine, 'beforeUpdate', () => {
            // Retour forcé des flippers (Ressort puissant)
            Body.setAngularVelocity(leftF.body, (0.4 - leftF.body.angle) * 0.5);
            Body.setAngularVelocity(rightF.body, (-0.4 - rightF.body.angle) * 0.5);
            
            // Limitation stricte des angles
            if (leftF.body.angle > 0.4) Body.setAngle(leftF.body, 0.4);
            if (rightF.body.angle < -0.4) Body.setAngle(rightF.body, -0.4);

            // SÉCURITÉ ANTI-TRAVERSÉE FLIPPERS
            // Si la bille s'approche trop des flips à grande vitesse, on réduit sa vélocité max
            if (ball.velocity.y > 15) {
                Body.setVelocity(ball, { x: ball.velocity.x, y: 15 });
            }

            // GESTION PERTE
            if (ball.position.y > 620 && !isGameOver) {
                isGameOver = true;
                alert("GAME OVER ! Score : " + score);
                score = 0;
                document.getElementById('score').innerText = `SCORE: 0000`;
                Body.setPosition(ball, { x: 190, y: 50 });
                Body.setVelocity(ball, { x: 0, y: 0 });
                setTimeout(() => { isGameOver = false; }, 1000);
            }
        });

        Render.run(render);
        Runner.run(Runner.create(), engine);
    </script>
</body>
</html>
