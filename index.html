<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eagle Pinball - Final Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; flex-direction: column; align-items: center; touch-action: none; }
        #score { color: #00ff41; font-family: monospace; font-size: 24px; padding: 10px; }
        canvas { border: 2px solid #00ff41; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="score">SCORE: 0000</div>
    <script>
        const { Engine, Render, Runner, Bodies, Composite, Constraint, Events, Body, Vector } = Matter;
        
        const engine = Engine.create();
        const world = engine.world;
        world.gravity.y = 1.4; // Gravité stable

        const render = Render.create({
            element: document.body,
            engine: engine,
            options: { width: 380, height: 580, wireframes: false, background: '#050505' }
        });

        // --- MURS ---
        const wallStyle = { isStatic: true, render: { fillStyle: '#00ff41' } };
        Composite.add(world, [
            Bodies.rectangle(190, 0, 380, 40, wallStyle),
            Bodies.rectangle(0, 290, 40, 580, wallStyle),
            Bodies.rectangle(380, 290, 40, 580, wallStyle),
            Bodies.rectangle(50, 570, 180, 50, { isStatic: true, angle: 0.5, ...wallStyle }),
            Bodies.rectangle(330, 570, 180, 50, { isStatic: true, angle: -0.5, ...wallStyle })
        ]);

        // --- BUMPERS (Rebond 0 pour stopper le ping-pong infini) ---
        const createBumper = (x, y) => {
            return Bodies.circle(x, y, 18, { 
                isStatic: true, label: "bumper", restitution: 0,
                render: { fillStyle: '#053a10', strokeStyle: '#00ff41', lineWidth: 3 } 
            });
        };
        const bumpers = [createBumper(110, 140), createBumper(270, 140), createBumper(190, 240)];
        Composite.add(world, bumpers);

        // --- BILLE ---
        let ball = Bodies.circle(190, 50, 11, { density: 0.5, label: "ball", restitution: 0.1 });
        Composite.add(world, ball);
                // --- FLIPPERS (Pivots recalibrés) ---
        const createFlipper = (x, y, side) => {
            const isLeft = side === 'left';
            const f = Bodies.rectangle(x, y, 115, 38, { 
                label: "flipper", 
                render: { fillStyle: '#00ff41' },
                chamfer: { radius: 15 }
            });
            const p = Constraint.create({
                bodyB: f, 
                pointB: { x: isLeft ? -45 : 45, y: 0 },
                pointA: { x: x, y: y }, 
                stiffness: 1, length: 0, render: { visible: false }
            });
            return { body: f, pivot: p, side: side };
        };

        const leftF = createFlipper(105, 505, 'left');
        const rightF = createFlipper(275, 505, 'right');
        Composite.add(world, [leftF.body, leftF.pivot, rightF.body, rightF.pivot]);

        let score = 0;
        let isGameOver = false;

        // --- COMMANDE DE FRAPPE ---
        const flip = (f) => {
            // Force la rotation immédiate
            Body.setAngularVelocity(f.body, f.side === 'left' ? -0.7 : 0.7);
        };

        window.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touchX = e.touches[0].clientX;
            if (touchX < window.innerWidth / 2) flip(leftF);
            else flip(rightF);
        }, { passive: false });

        // --- COLLISIONS : SCORE + EXPULSION VARIÉE ---
        Events.on(engine, 'collisionStart', (event) => {
            event.pairs.forEach((pair) => {
                if (pair.bodyA.label === "bumper" || pair.bodyB.label === "bumper") {
                    const bumper = pair.bodyA.label === "bumper" ? pair.bodyA : pair.bodyB;
                    score += 100;
                    document.getElementById('score').innerText = `SCORE: ${score.toString().padStart(4, '0')}`;
                    
                    // Secret : On ajoute un "random" au vecteur pour casser les rebonds infinis
                    const diff = Vector.sub(ball.position, bumper.position);
                    const randomX = (Math.random() - 0.5) * 4; 
                    const boost = Vector.mult(Vector.normalise({ x: diff.x + randomX, y: diff.y }), 13);
                    Body.setVelocity(ball, boost);
                }
            });
        });

        // --- BOUCLE PRINCIPALE ---
        Events.on(engine, 'beforeUpdate', () => {
            // Ressort de rappel des flippers (plus nerveux)
            Body.setAngularVelocity(leftF.body, (0.45 - leftF.body.angle) * 0.3);
            Body.setAngularVelocity(rightF.body, (-0.45 - rightF.body.angle) * 0.3);
            
            // Verrouillage des angles
            if (leftF.body.angle > 0.45) Body.setAngle(leftF.body, 0.45);
            if (rightF.body.angle < -0.45) Body.setAngle(rightF.body, -0.45);

            // Gestion Perte de balle
            if (ball.position.y > 600 && !isGameOver) {
                isGameOver = true;
                alert("GAME OVER ! Score : " + score);
                score = 0;
                document.getElementById('score').innerText = "SCORE: 0000";
                Body.setPosition(ball, { x: 190, y: 50 });
                Body.setVelocity(ball, { x: 0, y: 0 });
                setTimeout(() => isGameOver = false, 1000);
            }
        });

        Render.run(render);
        Runner.run(Runner.create(), engine);
    </script>
</body>
</html>
