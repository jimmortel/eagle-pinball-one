<!DOCTYPE html>
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eagle Pinball - Fixed</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; flex-direction: column; align-items: center; touch-action: none; }
        #score { color: #00ff41; font-family: monospace; font-size: 24px; padding: 10px; text-shadow: 0 0 10px #00ff41; }
        canvas { border: 2px solid #00ff41; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="score">SCORE: 0000</div>
    <script>
        // AJOUT DE "Vector" ICI POUR L'ANTI-COLLAGE
        const { Engine, Render, Runner, Bodies, Composite, Constraint, Events, Body, Vector } = Matter;
        const engine = Engine.create({ positionIterations: 15 });
        const world = engine.world;
        world.gravity.y = 1.8;

        const render = Render.create({
            element: document.body,
            engine: engine,
            options: { width: 380, height: 580, wireframes: false, background: '#050505' }
        });

        // STRUCTURE ET RAMPES
        const wallStyle = { isStatic: true, render: { fillStyle: '#00ff41' } };
        Composite.add(world, [
            Bodies.rectangle(190, 0, 380, 20, wallStyle), 
            Bodies.rectangle(0, 290, 20, 580, wallStyle),   
            Bodies.rectangle(380, 290, 20, 580, wallStyle),  
            Bodies.rectangle(50, 570, 160, 45, { isStatic: true, angle: 0.5, render: { fillStyle: '#00ff41' } }),
            Bodies.rectangle(330, 570, 160, 45, { isStatic: true, angle: -0.5, render: { fillStyle: '#00ff41' } })
        ]);

        // BUMPERS (Taille 15 = plus d'espace pour descendre)
        const createBumper = (x, y) => {
            let b = Bodies.circle(x, y, 15, { isStatic: true, restitution: 1.5, render: { fillStyle: '#053a10', strokeStyle: '#00ff41', lineWidth: 3 } });
            b.label = "bumper";
            return b;
        };
        Composite.add(world, [createBumper(120, 150), createBumper(260, 150), createBumper(190, 280)]);

        // LA BILLE (Lourde pour traverser les bugs)
        let ball = Bodies.circle(190, 50, 12, { restitution: 0.4, friction: 0, density: 0.1, label: "ball" });
        Composite.add(world, ball);
Composite.add(world, [
    Bodies.rectangle(190, 0, 380, 20, wallStyle), 
    Bodies.rectangle(0, 290, 20, 580, wallStyle),   
    Bodies.rectangle(380, 290, 20, 580, wallStyle),  
    // Rampes plus lisses pour guider la balle
    Bodies.rectangle(50, 570, 160, 40, { isStatic: true, angle: 0.5, render: { fillStyle: '#00ff41' } }),
    Bodies.rectangle(330, 570, 160, 40, { isStatic: true, angle: -0.5, render: { fillStyle: '#00ff41' } })
]);

        // --- FLIPPERS ÉPAIS (Anti-traversée) ---
        const createFlipper = (x, y, side) => {
            const isLeft = side === 'left';
            const flipper = Bodies.rectangle(x, y, 110, 35, { 
                chamfer: { radius: 10 }, 
                render: { fillStyle: '#00ff41' } 
            });
            const pivot = Constraint.create({
                bodyB: flipper, 
                pointB: { x: isLeft ? -45 : 45, y: 0 },
                pointA: { x: x, y: y }, 
                stiffness: 1, length: 0, render: { visible: false }
            });
            return { body: flipper, pivot: pivot, side: side };
        };

        const leftF = createFlipper(100, 510, 'left');
        const rightF = createFlipper(280, 510, 'right');
        Composite.add(world, [leftF.body, leftF.pivot, rightF.body, rightF.pivot]);

        // --- LOGIQUE DE FRAPPE ---
        const flip = (f) => {
            const force = -1.2; 
            const offset = f.side === 'left' ? 50 : -50;
            Body.applyForce(f.body, { x: f.body.position.x + offset, y: f.body.position.y }, { x: 0, y: force });
        };

        window.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touchX = e.touches[0].clientX;
            if (touchX < window.innerWidth / 2) flip(leftF);
            else flip(rightF);
        }, { passive: false });

        // --- MISE À JOUR ET ANTI-COLLAGE ---
        Events.on(engine, 'beforeUpdate', () => {
            // Rappel des flips (ressort)
            Body.setAngularVelocity(leftF.body, (0.4 - leftF.body.angle) * 0.35);
            Body.setAngularVelocity(rightF.body, (-0.4 - rightF.body.angle) * 0.35);
            
            // Sécurité angles de repos
            if (leftF.body.angle > 0.4) Body.setAngle(leftF.body, 0.4);
            if (rightF.body.angle < -0.4) Body.setAngle(rightF.body, -0.4);

            // Reset automatique si la bille tombe
            if (ball.position.y > 600) {
                Body.setPosition(ball, { x: 190, y: 50 });
                Body.setVelocity(ball, { x: 0, y: 0 });
            }
        });

                // --- RÉPULSION FORCÉE (ADOUCIE ET DÉVIÉE) ---
        Events.on(engine, 'collisionStart', (event) => {
            event.pairs.forEach((pair) => {
                if (pair.bodyA.label === "bumper" || pair.bodyB.label === "bumper") {
                    const bumper = pair.bodyA.label === "bumper" ? pair.bodyA : pair.bodyB;
                    
                    // 1. On calcule la direction de base
                    const diff = Vector.sub(ball.position, bumper.position);
                    const normalized = Vector.normalise(diff);
                    
                    // 2. On ajoute une petite déviation aléatoire (X) pour casser les boucles infinies
                    const randomX = (Math.random() - 0.5) * 0.5;
                    const finalDir = { x: normalized.x + randomX, y: normalized.y };
                    
                    // 3. Force réduite à 10 (au lieu de 15) pour plus de contrôle
                    const boost = Vector.mult(Vector.normalise(finalDir), 10);
                    
                    Body.setVelocity(ball, boost);
                }
            });
        });

        Render.run(render);
        Runner.run(Runner.create(), engine);
    </script>
</body>
</html>
