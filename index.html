<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eagle Pinball One</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            font-family: 'Courier New', Courier, monospace; 
            touch-action: none;
        }
        #ui-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            justify-content: space-between;
            padding: 10px;
            box-sizing: border-box;
        }
        #score { 
            color: #00ff41; 
            font-size: 20px; 
            text-shadow: 0 0 10px #00ff41; 
        }
        #status {
            color: #fff;
            font-size: 14px;
            text-transform: uppercase;
        }
        canvas { 
            border: 3px solid #00ff41; 
            box-shadow: 0 0 25px rgba(0, 255, 65, 0.5); 
            border-radius: 15px; 
            background: radial-gradient(circle, #101010 0%, #000 100%);
        }
        .arcade-btn {
            margin-top: 15px;
            padding: 12px 24px;
            background: #00ff41;
            color: #000;
            border: none;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 0 15px #00ff41;
        }
    </style>
</head>
<body>
    <div id="ui-container">
        <div id="score">SCORE: 0000</div>
        <div id="status">Eagle Arcade v1</div>
    </div>

    <script>
        const { Engine, Render, Runner, Bodies, Composite, Constraint, Events, Body } = Matter;

        // --- CONFIGURATION ---
        const WALLET_DESTINATION = "0x872bD846596Cc1aEde8Fd800997d242e3473fA83";
        const engine = Engine.create();
        const world = engine.world;
        world.gravity.y = 1.6; // Gravité lourde pour le réalisme

        const render = Render.create({
            element: document.body,
            engine: engine,
            options: { 
                width: 380, 
                height: 580, 
                wireframes: false, 
                background: 'transparent' 
            }
        });

        // --- STRUCTURE DU PLATEAU (Néon) ---
        const wallStyle = { isStatic: true, render: { fillStyle: '#00ff41' } };
        const walls = [
            Bodies.rectangle(190, 0, 380, 20, wallStyle), // Haut
            Bodies.rectangle(0, 290, 20, 580, wallStyle),   // Gauche
            Bodies.rectangle(380, 290, 20, 580, wallStyle),  // Droite
            // Entonnoir vers les flippers
            Bodies.rectangle(50, 550, 140, 20, { isStatic: true, angle: 0.6, render: { fillStyle: '#00ff41' } }),
            Bodies.rectangle(330, 550, 140, 20, { isStatic: true, angle: -0.6, render: { fillStyle: '#00ff41' } })
        ];
        Composite.add(world, walls);

        // --- BUMPERS ÉLECTRIQUES ---
        const createBumper = (x, y) => {
            let b = Bodies.circle(x, y, 22, { 
                isStatic: true, 
                restitution: 2.0, // Rebond violent
                render: { fillStyle: '#053a10', strokeStyle: '#00ff41', lineWidth: 4 } 
            });
            b.label = "bumper";
            return b;
        };
        const bumpers = [createBumper(110, 140), createBumper(270, 140), createBumper(190, 240)];
        Composite.add(world, bumpers);

        // --- LA BILLE D'ACIER ---
        const ball = Bodies.circle(200, 40, 11, { 
            restitution: 0.4, 
            friction: 0.002, 
            density: 0.06, // Poids important
            render: { fillStyle: '#fff', strokeStyle: '#00ff41', lineWidth: 2 } 
        });
        Composite.add(world, ball);

        // --- LES FLIPPERS (PALETTES) ---
        const createFlipper = (x, y, side) => {
            const group = Body.nextGroup(true);
            const flipper = Bodies.rectangle(x, y, 85, 18, { 
                collisionFilter: { group: group },
                chamfer: { radius: 8 },
                render: { fillStyle: '#00ff41' }
            });
            const pivot = Constraint.create({
                bodyB: flipper, 
                pointB: { x: side === 'left' ? -38 : 38, y: 0 },
                pointA: { x: x, y: y }, 
                stiffness: 1, 
                length: 0,
                render: { visible: false }
            });
            return { body: flipper, pivot: pivot };
        };

        const leftF = createFlipper(125, 520, 'left');
        const rightF = createFlipper(255, 520, 'right');
        Composite.add(world, [leftF.body, leftF.pivot, rightF.body, rightF.pivot]);

        // --- CONTRÔLES TACTILES ---
        const pushFlipper = (f, strength) => Body.setAngularVelocity(f.body, strength);

        window.addEventListener('touchstart', (e) => {
            const touchX = e.touches[0].clientX;
            const screenWidth = window.innerWidth;
            if (touchX < screenWidth / 2) pushFlipper(leftF, -0.5);
            else pushFlipper(rightF, 0.5);
        });

        // --- SYSTÈME DE SCORE ---
        let score = 0;
        const scoreElement = document.getElementById('score');

        Events.on(engine, 'collisionStart', (event) => {
            event.pairs.forEach((pair) => {
                if (pair.bodyA.label === "bumper" || pair.bodyB.label === "bumper") {
                    score += 100;
                    scoreElement.innerText = `SCORE: ${score.toString().padStart(4, '0')}`;
                    // Optionnel: petit flash visuel sur le bumper
                }
            });
        });

        // Lancement
        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);
    </script>
</body>
  </html>
