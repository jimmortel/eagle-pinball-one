<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eagle Pinball One - Final</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; flex-direction: column; align-items: center; touch-action: none; }
        #score { color: #00ff41; font-family: monospace; font-size: 24px; padding: 10px; text-shadow: 0 0 10px #00ff41; }
        canvas { border: 2px solid #00ff41; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="score">SCORE: 0000</div>
    <script>
        const { Engine, Render, Runner, Bodies, Composite, Constraint, Events, Body, Vector } = Matter;
        
        // Précision Iterations à 20 pour stopper les traversées
        const engine = Engine.create({ positionIterations: 20 });
        const world = engine.world;
        world.gravity.y = 1.8;

        const render = Render.create({
            element: document.body,
            engine: engine,
            options: { width: 380, height: 580, wireframes: false, background: '#050505' }
        });

        // --- MURS ET RAMPES ---
        const wallStyle = { isStatic: true, render: { fillStyle: '#00ff41' } };
        Composite.add(world, [
            Bodies.rectangle(190, 0, 380, 20, wallStyle), // Haut
            Bodies.rectangle(0, 290, 20, 580, wallStyle),   // Gauche
            Bodies.rectangle(380, 290, 20, 580, wallStyle),  // Droite
            // Rampes pour boucher les coins derrière les flips
            Bodies.rectangle(50, 570, 160, 45, { isStatic: true, angle: 0.5, render: { fillStyle: '#00ff41' } }),
            Bodies.rectangle(330, 570, 160, 45, { isStatic: true, angle: -0.5, render: { fillStyle: '#00ff41' } })
        ]);
                // --- BUMPERS (Petits et Espacés) ---
        const createBumper = (x, y) => {
            let b = Bodies.circle(x, y, 16, { 
                isStatic: true, 
                restitution: 1.5, 
                render: { fillStyle: '#053a10', strokeStyle: '#00ff41', lineWidth: 3 } 
            });
            b.label = "bumper";
            return b;
        };
        Composite.add(world, [
            createBumper(110, 140), 
            createBumper(270, 140), 
            createBumper(190, 240) // Remonté pour laisser passer la bille
        ]);

        // --- LA BILLE ---
        let ball = Bodies.circle(190, 50, 12, { 
            restitution: 0.4, friction: 0, density: 0.1, label: "ball" 
        });
        Composite.add(world, ball);

        // --- FLIPPERS XXL (Robustes) ---
        const createFlipper = (x, y, side) => {
            const isLeft = side === 'left';
            const flipper = Bodies.rectangle(x, y, 120, 40, { 
                chamfer: { radius: 15 }, render: { fillStyle: '#00ff41' } 
            });
            const pivot = Constraint.create({
                bodyB: flipper, 
                pointB: { x: isLeft ? -50 : 50, y: 0 },
                pointA: { x: x, y: y }, 
                stiffness: 1, length: 0, render: { visible: false }
            });
            return { body: flipper, pivot: pivot, side: side };
        };

        const leftF = createFlipper(95, 510, 'left');
        const rightF = createFlipper(285, 510, 'right');
        Composite.add(world, [leftF.body, leftF.pivot, rightF.body, rightF.pivot]);
                // --- LOGIQUE DE JEU ---
        let score = 0;
        let isGameOver = false;

        const flip = (f) => {
            const force = -1.9; // Puissance maximale
            const offset = f.side === 'left' ? 60 : -60;
            Body.applyForce(f.body, { x: f.body.position.x + offset, y: f.body.position.y }, { x: 0, y: force });
        };

        window.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touchX = e.touches[0].clientX;
            if (touchX < window.innerWidth / 2) flip(leftF);
            else flip(rightF);
        }, { passive: false });

        // COLLISIONS : SCORE + RÉPULSION ANTI-TRAVERSÉE
        Events.on(engine, 'collisionStart', (event) => {
            if (isGameOver) return;
            event.pairs.forEach((pair) => {
                if (pair.bodyA.label === 'bumper' || pair.bodyB.label === 'bumper') {
                    const bumper = pair.bodyA.label === 'bumper' ? pair.bodyA : pair.bodyB;
                    score += 100;
                    document.getElementById('score').innerText = `SCORE: ${score.toString().padStart(4, '0')}`;

                    // On propulse la bille pour éviter qu'elle traverse ou colle
                    const diff = Vector.sub(ball.position, bumper.position);
                    const drift = (Math.random() - 0.5) * 2;
                    const boost = Vector.mult(Vector.normalise({ x: diff.x + drift, y: diff.y }), 14);
                    Body.setVelocity(ball, boost);
                }
            });
        });

        // BOUCLE DE MISE À JOUR (RESSORTS ET PERTE)
        Events.on(engine, 'beforeUpdate', () => {
            Body.setAngularVelocity(leftF.body, (0.4 - leftF.body.angle) * 0.45);
            Body.setAngularVelocity(rightF.body, (-0.4 - rightF.body.angle) * 0.45);
            
            if (leftF.body.angle > 0.4) Body.setAngle(leftF.body, 0.4);
            if (rightF.body.angle < -0.4) Body.setAngle(rightF.body, -0.4);

            // GESTION GAME OVER
            if (ball.position.y > 600 && !isGameOver) {
                isGameOver = true;
                alert("GAME OVER ! Score : " + score);
                score = 0;
                document.getElementById('score').innerText = `SCORE: 0000`;
                Body.setPosition(ball, { x: 190, y: 50 });
                Body.setVelocity(ball, { x: 0, y: 0 });
                setTimeout(() => { isGameOver = false; }, 800);
            }
        });

        Render.run(render);
        Runner.run(Runner.create(), engine);
    </script>
</body>
</html>
